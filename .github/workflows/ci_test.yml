name: CI Pull request run tests
on:
  pull_request:
    branches: [main, deploy-test]

  workflow_call:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: node and yarn
        uses: ./.github/actions/python-install

      - name: Code QA
        run: |
          yarn lint
          yarn prettier-check
          yarn test
